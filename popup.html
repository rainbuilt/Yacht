<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yacht</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup">
    <header class="header">
      <div>
        <h1>Yacht</h1>
        <p>Visual threads for ChatGPT</p>
      </div>
      <span class="version" id="version"></span>
    </header>

    <section class="status" id="status">
      <div class="status-dot"></div>
      <div>
        <strong id="status-title">Checking page</strong>
        <span id="status-detail">Looking for ChatGPT...</span>
      </div>
    </section>

    <section class="stats" aria-label="Conversation status">
      <div>
        <span>Threads</span>
        <strong id="thread-count">-</strong>
      </div>
      <div>
        <span>Anchors</span>
        <strong id="anchor-count">-</strong>
      </div>
    </section>

    <section class="controls" aria-label="Yacht controls">
      <label class="toggle-row">
        <span>
          <strong>Enable Yacht</strong>
          <small>Run on this ChatGPT page</small>
        </span>
        <input id="enabled-toggle" type="checkbox">
      </label>
    </section>

    <section class="color-panel" aria-label="Anchor color">
      <div class="section-head">
        <strong>Anchor color</strong>
        <input id="anchor-color" type="color" value="#2f7df6" aria-label="Custom anchor color">
      </div>
      <div class="swatches" id="swatches">
        <button type="button" data-color="#2f7df6" style="--swatch: #2f7df6" aria-label="Blue"></button>
        <button type="button" data-color="#0891b2" style="--swatch: #0891b2" aria-label="Cyan"></button>
        <button type="button" data-color="#1a936f" style="--swatch: #1a936f" aria-label="Green"></button>
        <button type="button" data-color="#65a30d" style="--swatch: #65a30d" aria-label="Lime"></button>
        <button type="button" data-color="#ca8a04" style="--swatch: #ca8a04" aria-label="Yellow"></button>
        <button type="button" data-color="#d97706" style="--swatch: #d97706" aria-label="Amber"></button>
        <button type="button" data-color="#dc3d5a" style="--swatch: #dc3d5a" aria-label="Rose"></button>
        <button type="button" data-color="#db2777" style="--swatch: #db2777" aria-label="Pink"></button>
        <button type="button" data-color="#b45ad6" style="--swatch: #b45ad6" aria-label="Purple"></button>
        <button type="button" data-color="#64748b" style="--swatch: #64748b" aria-label="Slate"></button>
      </div>
    </section>

    <button class="reset" id="reset-button" type="button">Reset this chat</button>
  </main>

  <script src="popup.js"></script>
</body>
</html>
